<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Noxtua · Sign in</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11; --surface: #16181c; --border: #2a2d35;
    --text: #e8eaf0; --muted: #7a8099; --accent: #c8f060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
  }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 40px 36px; width: 340px;
  }
  .logo {
    font-family: 'Fraunces', serif; font-size: 22px;
    color: var(--accent); margin-bottom: 28px;
  }
  .logo span { color: var(--muted); font-style: italic; font-weight: 300; }
  label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); display: block; margin-bottom: 5px; }
  input {
    width: 100%; background: #1e2026; border: 1px solid var(--border);
    border-radius: 6px; padding: 9px 12px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 13px;
    outline: none; margin-bottom: 16px;
  }
  input:focus { border-color: var(--accent); }
  .btn {
    width: 100%; padding: 10px; background: var(--accent);
    color: #0e0f11; border: none; border-radius: 6px;
    font-family: 'DM Mono', monospace; font-size: 13px;
    font-weight: 500; cursor: pointer; margin-top: 4px;
  }
  .btn:hover { opacity: 0.9; }
  .error {
    background: rgba(240,96,96,0.1); border: 1px solid rgba(240,96,96,0.2);
    color: #f06060; font-size: 11px; border-radius: 5px;
    padding: 8px 10px; margin-bottom: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Noxtua <span>· Insights</span></div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" autocomplete="username" autofocus>
    <label>Password</label>
    <input type="password" name="password" autocomplete="current-password">
    <button class="btn" type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
